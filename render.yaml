services:
  - type: web
    name: atlasmarkets-anubis
    runtime: docker
    dockerfilePath: crypto_api/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: FACILITATOR_URL
        value: https://facilitator.payai.network
      - key: PYTHONUNBUFFERED
        value: "1"

  - type: web
    name: atlasmarkets-viking
    runtime: docker
    dockerfilePath: stock_api/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: FACILITATOR_URL
        value: https://facilitator.payai.network
      - key: PYTHONUNBUFFERED
        value: "1"

  - type: web
    name: atlasmarkets-apollo
    runtime: docker
    dockerfilePath: forex_api/Dockerfile
