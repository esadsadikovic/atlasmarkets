    healthCheckPath: /health
    envVars:
      - key: FACILITATOR_URL
        value: https://facilitator.payai.network
      - key: PYTHONUNBUFFERED
        value: "1"

  - type: web
    name: atlasmarkets-pollux
    env: docker
    rootDir: commodities_api
    dockerfilePath: commodities_api/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: FACILITATOR_URL
        value: https://facilitator.payai.network
      - key: PYTHONUNBUFFERED
        value: "1"

  - type: web
    name: atlasmarkets-dagon
    env: docker
    rootDir: onchain_api
    dockerfilePath: onchain_api/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: FACILITATOR_URL
        value: https://facilitator.payai.network
      - key: PYTHONUNBUFFERED
        value: "1"