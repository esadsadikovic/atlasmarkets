        value: https://facilitator.payai.network
      - key: PYTHONUNBUFFERED
        value: "1"

  - type: web
    name: atlasmarkets-pollux
    runtime: docker
    dockerfilePath: commodities_api/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: FACILITATOR_URL
        value: https://facilitator.payai.network
      - key: PYTHONUNBUFFERED
        value: "1"

  - type: web
    name: atlasmarkets-dagon
    runtime: docker
    dockerfilePath: onchain_api/Dockerfile
    plan: free
    healthCheckPath: /health
