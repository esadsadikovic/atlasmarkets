services:
  - type: web
    name: atlasmarkets-anubis
    env: docker
    rootDir: crypto_api
    dockerfilePath: crypto_api/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: FACILITATOR_URL
        value: https://facilitator.payai.network
      - key: PYTHONUNBUFFERED
        value: "1"

  - type: web
    name: atlasmarkets-viking
    env: docker
    rootDir: stock_api
    dockerfilePath: stock_api/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: FACILITATOR_URL
        value: https://facilitator.payai.network
      - key: PYTHONUNBUFFERED
        value: "1"

  - type: web
    name: atlasmarkets-apollo
    env: docker
    rootDir: forex_api
    dockerfilePath: forex_api/Dockerfile
